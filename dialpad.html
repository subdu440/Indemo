#numberDisplay {
    width: 92%;

    border-radius: 30px;
}

.keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.digit,  #backspace, #callButton {
    padding: 15px;
    font-size: 1.1em;
    cursor: pointer;
    border: 1px solid #ccc;
    border-radius: 20%;
    background-color: #fff;
    transition: background-color 0.2s;
}

.digit:hover, #backspace:hover, #callButton:hover {
    background-color: #e9e9e9;
    border: #88B578 1px solid;
}

#callButton {
    background-color: #4CAF50;
    color: white;
    grid-column: span 3; /* Centers the call button */
    width: 100px;
    border-radius: 50px;
    margin: 0 auto;
}

#callButton:hover {
    background-color: #45a049;
    
 ;

    <div class="phone-dialpad">

          <button id="backspace" style="visibility: hidden;"></button
          <a href="index-app.html">
          <button id="backspace" >back</button> </a>
          
        <button id="callButton"><i class="fa-solid fa-phone"></i></button>
    </div>
</div>
<script>
 document.addEventListener('DOMContentLoaded', () => {
    const numberDisplay = document.getElementById('numberDisplay');
    const digits = document.querySelectorAll('.digit');
    const backspace = document.getElementById('backspace');
    const callButton = document.getElementById('callButton');

    // Add event listeners for digit buttons
    digits.forEach(button => {
        button.addEventListener('click', () => {
            numberDisplay.value += button.textContent;
        });
    });

    // Add event listener for the backspace button
    backspace.addEventListener('click', () => {
        numberDisplay.value = numberDisplay.value.slice(0, -1);
    });

    // Add event listener for the call button
    callButton.addEventListener('click', () => {
        const phoneNumber = numberDisplay.value;
        if (phoneNumber) {
            // Initiates a phone call on supported devices
            window.location.href = `tel:${phoneNumber}`;
            // Alternative method: window.open(`tel:${phoneNumber}`, '_self');
        } else {
            alert('Please enter a phone number.');
        }
    });
});
</script>
